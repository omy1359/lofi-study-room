<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Study Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .active-tab { border-bottom: 2px solid #818cf8; color: #818cf8; }
        input::-webkit-inner-spin-button { display: none; }
        .music-btn { transition: all 0.3s ease; }
        .music-btn:hover { background: rgba(129, 140, 248, 0.2); transform: translateY(-2px); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-end max-w-7xl mx-auto w-full mb-8">
        <div class="flex flex-col gap-1">
            <h1 class="text-xl font-bold tracking-widest text-indigo-400 font-mono leading-none">🌙 STUDY ROOM</h1>
            <div id="current-date" class="text-[10px] tracking-[0.2em] text-slate-500 font-bold uppercase ml-1">2026. 00. 00. ---</div>
        </div>
        <div id="main-display" class="glass px-6 py-2 rounded-full mono text-2xl text-indigo-300 shadow-lg border border-indigo-500/30">00:00:00</div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8 max-w-7xl mx-auto w-full flex-grow">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="glass rounded-3xl overflow-hidden aspect-video shadow-2xl border border-white/5">
                <iframe id="main-video" width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            
            <div class="glass p-3 rounded-2xl border border-white/10 overflow-x-auto">
                <div class="flex gap-2 min-w-max">
                    <button onclick="changeMusic('jfKfPfyJRdk')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter border-indigo-500/50">🎧 LOFI GIRL</button>
                    <button onclick="changeMusic('4xDzrJKXOOY')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">💻 CODING</button>
                    <button onclick="changeMusic('rPjez8z61rI')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">☕ CAFE JAZZ</button>
                    <button onclick="changeMusic('lP26UCnoH9s')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">🌧️ RAINY DAY</button>
                    <button onclick="changeMusic('n61ULEU7QD4')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">🌃 CHILL NIGHT</button>
                    <button onclick="changeMusic('S0_U3_fK9I0')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">📚 CLASSICAL</button>
                    <button onclick="changeMusic('mv5qzMt7dg8')" class="music-btn px-4 py-2 rounded-xl glass text-[10px] font-bold tracking-tighter">🌳 NATURE</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.open('https://meet.google.com/new')" class="glass hover:bg-white/10 px-6 py-4 rounded-2xl transition flex flex-col items-center justify-center gap-2 border border-white/10 group text-center">
                        <span class="text-sm font-bold group-hover:text-indigo-400">Google Meet</span>
                        <span class="text-[10px] opacity-40 uppercase tracking-tighter">Start New Meeting</span>
                    </button>
                    <button onclick="window.open('https://zoom.us/start/webinar')" class="glass hover:bg-white/10 px-6 py-4 rounded-2xl transition flex flex-col items-center justify-center gap-2 border border-white/10 group text-center">
                        <span class="text-sm font-bold group-hover:text-blue-400">Zoom Meeting</span>
                        <span class="text-[10px] opacity-40 uppercase tracking-tighter">Instant Launch</span>
                    </button>
                </div>
                <div class="glass px-6 py-4 rounded-2xl border border-white/10 flex flex-col justify-center items-center text-center">
                    <p id="daily-quote" class="text-[11px] text-slate-300 leading-relaxed italic mb-1">"Your limitation—it’s only your imagination."</p>
                    <p id="quote-author" class="text-[9px] text-indigo-400/60 uppercase tracking-widest font-bold">Daily Motivation</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass p-6 rounded-3xl shadow-xl border border-white/10">
                <div class="flex justify-around mb-6 text-sm font-bold border-b border-white/5">
                    <button id="tab-timer" onclick="setMode('timer')" class="pb-2 px-2 active-tab transition-all">TIMER</button>
                    <button id="tab-stopwatch" onclick="setMode('stopwatch')" class="pb-2 px-2 opacity-50 transition-all">STOPWATCH</button>
                </div>

                <div id="timer-setting" class="flex justify-center items-center gap-2 mb-4">
                    <input type="number" id="input-min" value="25" min="0" max="999" class="bg-white/5 border border-white/10 rounded-lg w-16 py-1 text-center mono text-xl focus:outline-none focus:border-indigo-500 text-white">
                    <span class="text-slate-500 font-bold text-xs uppercase tracking-tighter">Minutes</span>
                </div>

                <div class="text-center mb-6">
                    <div id="display" class="text-5xl mono font-medium mb-2 text-white">25:00</div>
                    <p id="mode-label" class="text-[10px] tracking-[0.2em] text-slate-500 uppercase">Focus Mode</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button id="start-btn" onclick="start()" class="col-span-2 bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold transition shadow-lg shadow-indigo-500/20">START</button>
                    <button onclick="pause()" class="bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition text-sm text-slate-300">PAUSE</button>
                    <button onclick="reset()" class="bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition text-sm text-rose-400">RESET</button>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl border border-white/5 text-center">
                <p class="text-[10px] text-slate-500 leading-relaxed italic mb-1">"Stay focused, stay humble."</p>
                <p class="text-[9px] text-slate-600 uppercase tracking-widest">Notification Alert</p>
            </div>
        </div>
    </main>

    <footer class="mt-8 flex justify-between items-center max-w-7xl mx-auto w-full border-t border-white/5 pt-6">
        <div class="text-[10px] text-slate-600 tracking-widest uppercase">Study Room &copy; 2026</div>
        <div class="text-[11px] text-indigo-400/60 font-medium tracking-tight">Made by - Minhyuck Oh</div>
    </footer>

    <script>
        // 음악 변경 함수
        function changeMusic(videoId) {
            const player = document.getElementById('main-video');
            player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0`;
        }

        const quotes = [
            { text: "Your limitation—it's only your imagination.", author: "Daily Motivation" },
            { text: "Push yourself, because no one else is going to do it for you.", author: "Success Mindset" },
            { text: "Success doesn't just find you. You have to go out and get it.", author: "Greatness" },
            { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Hard Work" },
            { text: "Dream bigger. Do bigger.", author: "Vision" },
            { text: "Don't stop when you're tired. Stop when you're done.", author: "Persistence" },
            { text: "Wake up with determination. Go to bed with satisfaction.", author: "Routine" },
            { text: "Do something today that your future self will thank you for.", author: "Future" },
            { text: "Little things make big days.", author: "Consistency" },
            { text: "It's going to be hard, but hard does not mean impossible.", author: "Strength" }
        ];

        function displayRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('daily-quote').innerText = `"${quotes[randomIndex].text}"`;
            document.getElementById('quote-author').innerText = quotes[randomIndex].author;
        }

        function updateDate() {
            const now = new Date();
            const year = now.getFullYear(), month = String(now.getMonth() + 1).padStart(2, '0'), date = String(now.getDate()).padStart(2, '0');
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.getElementById('current-date').innerText = `${year}. ${month}. ${date}. ${dayNames[now.getDay()]}`;
        }

        updateDate(); displayRandomQuote();

        let mode = 'timer', time = 25 * 60, elapsed = 0, isRunning = false, interval;
        const inputMin = document.getElementById('input-min');

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        inputMin.addEventListener('input', () => {
            if (mode === 'timer' && !isRunning) {
                time = Math.max(0, parseInt(inputMin.value || 0)) * 60;
                document.getElementById('display').innerText = formatTime(time);
                document.getElementById('main-display').innerText = formatTime(time);
            }
        });

        function setMode(newMode) {
            pause(); mode = newMode;
            document.getElementById('tab-timer').className = mode === 'timer' ? 'pb-2 px-2 active-tab' : 'pb-2 px-2 opacity-50';
            document.getElementById('tab-stopwatch').className = mode === 'stopwatch' ? 'pb-2 px-2 active-tab' : 'pb-2 px-2 opacity-50';
            document.getElementById('timer-setting').style.visibility = mode === 'timer' ? 'visible' : 'hidden';
            if (mode === 'timer') {
                time = parseInt(inputMin.value || 0) * 60;
                document.getElementById('mode-label').innerText = "Focus Mode";
                document.getElementById('display').innerText = formatTime(time);
            } else {
                elapsed = 0;
                document.getElementById('mode-label').innerText = "Study Records";
                document.getElementById('display').innerText = "00:00:00";
            }
        }

        function start() {
            if (isRunning) return;
            if (mode === 'timer' && time <= 0) return alert("Please set focus time!");
            isRunning = true;
            document.getElementById('start-btn').innerText = "RUNNING...";
            interval = setInterval(() => {
                if (mode === 'timer') {
                    if (time <= 0) { pause(); alert("Time is up! Take a break."); return; }
                    time--; document.getElementById('display').innerText = formatTime(time);
                } else {
                    elapsed++; document.getElementById('display').innerText = formatTime(elapsed);
                }
                document.getElementById('main-display').innerText = document.getElementById('display').innerText;
            }, 1000);
        }

        function pause() { isRunning = false; clearInterval(interval); document.getElementById('start-btn').innerText = "START"; }
        function reset() { pause(); if (mode === 'timer') { time = parseInt(inputMin.value || 0) * 60; document.getElementById('display').innerText = formatTime(time); } else { elapsed = 0; document.getElementById('display').innerText = "00:00:00"; } document.getElementById('main-display').innerText = document.getElementById('display').innerText; }
    </script>
</body>
</html>
