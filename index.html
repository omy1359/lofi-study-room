<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lofi Study Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-3xl font-bold mb-6 text-indigo-400">🌙 민혁의 로파이 스터디 룸</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-6xl p-4">
        <div class="bg-gray-800 p-4 rounded-2xl shadow-xl">
            <h2 class="mb-4 text-center font-semibold">🎵 Lo-fi Music</h2>
            <div class="aspect-video">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-2xl shadow-xl flex flex-col items-center justify-center">
            <h2 class="mb-4 font-semibold">💻 Study Cam</h2>
            <div class="bg-gray-700 w-full h-full rounded-lg flex items-center justify-center text-gray-400">
                <p>여기에 구글 미팅 주소를 연결하세요!</p>
            </div>
            <button onclick="window.open('https://meet.google.com/new')" class="mt-4 bg-indigo-600 px-6 py-2 rounded-full font-bold">새 회의 시작하기</button>
        </div>
    </div>
</body>
</html>
