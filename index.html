<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Study Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .active-tab { border-bottom: 2px solid #818cf8; color: #818cf8; }
        input::-webkit-inner-spin-button { display: none; }
        .music-btn { transition: all 0.3s ease; white-space: nowrap; border: 1px solid rgba(255,255,255,0.05); }
        .music-btn:hover { background: rgba(129, 140, 248, 0.2); transform: translateY(-2px); border-color: #818cf8; }
        input::placeholder { color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col p-4 md:p-8">

    <header class="flex justify-between items-end max-w-7xl mx-auto w-full mb-8">
        <div class="flex flex-col gap-1">
            <h1 class="text-xl font-bold tracking-widest text-indigo-400 font-mono leading-none">🌙 STUDY ROOM</h1>
            <div id="current-date" class="text-[10px] tracking-[0.2em] text-slate-500 font-bold uppercase ml-1">2026. 03. 08. SUN</div>
        </div>
        <div id="main-display" class="glass px-6 py-2 rounded-full mono text-2xl text-indigo-300 shadow-lg border border-indigo-500/30 font-bold text-center">00:00:00</div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8 max-w-7xl mx-auto w-full flex-grow">
        <div class="lg:col-span-2 space-y-6">
            <div class="glass rounded-3xl overflow-hidden aspect-video shadow-2xl border border-white/5 bg-black">
                <iframe id="main-video" width="100%" height="100%" 
                        src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&rel=0&enablejsapi=1" 
                        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            
            <div class="glass p-4 rounded-3xl border border-white/10 space-y-4">
                <div class="flex gap-4 justify-center border-b border-white/5 pb-4">
                    <button onclick="changeMusic('jfKfPfyJRdk')" class="music-btn px-6 py-2 rounded-xl glass text-[10px] font-bold border-indigo-500/50 flex items-center gap-2">
                        <span>📚</span> LOFI STUDY
                    </button>
                    <button onclick="changeMusic('4xDzrJKXOOY')" class="music-btn px-6 py-2 rounded-xl glass text-[10px] font-bold flex items-center gap-2">
                        <span>🌌</span> SYNTHWAVE
                    </button>
                </div>
                
                <div class="flex gap-2">
                    <input type="text" id="custom-url" placeholder="Enter your own YouTube playlist URL" 
                           class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 flex-grow text-[11px] focus:outline-none focus:border-indigo-500 transition">
                    <button onclick="loadCustomVideo()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-[11px] font-bold transition">CONNECT</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.open('https://meet.google.com/new')" class="glass hover:bg-white/10 px-6 py-4 rounded-2xl transition flex flex-col items-center justify-center border border-white/10">
                        <span class="text-sm font-bold">Google Meet</span>
                        <span class="text-[9px] opacity-40 uppercase tracking-tighter">New Meeting</span>
                    </button>
                    <button onclick="window.open('https://zoom.us/start/webinar')" class="glass hover:bg-white/10 px-6 py-4 rounded-2xl transition flex flex-col items-center justify-center border border-white/10">
                        <span class="text-sm font-bold">Zoom Meeting</span>
                        <span class="text-[9px] opacity-40 uppercase tracking-tighter">Instant Launch</span>
                    </button>
                </div>
                <div class="glass px-6 py-4 rounded-2xl border border-white/10 flex flex-col justify-center items-center text-center">
                    <p id="daily-quote" class="text-[11px] text-slate-300 leading-relaxed italic mb-1">"Your limitation—it’s only your imagination."</p>
                    <p id="quote-author" class="text-[9px] text-indigo-400/60 uppercase tracking-widest font-bold">Daily Motivation</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass p-6 rounded-3xl shadow-xl border border-white/10">
                <div class="flex justify-around mb-6 text-sm font-bold border-b border-white/5">
                    <button id="tab-timer" onclick="setMode('timer')" class="pb-2 px-2 active-tab font-bold">TIMER</button>
                    <button id="tab-stopwatch" onclick="setMode('stopwatch')" class="pb-2 px-2 opacity-50 font-bold">STOPWATCH</button>
                </div>
                <div id="timer-setting" class="flex justify-center items-center gap-2 mb-4">
                    <input type="number" id="input-min" value="25" min="0" max="999" class="bg-white/5 border border-white/10 rounded-lg w-16 py-1 text-center mono text-xl focus:outline-none focus:border-indigo-500 text-white font-bold">
                    <span class="text-slate-500 font-bold text-xs uppercase tracking-tighter">Minutes</span>
                </div>
                <div class="text-center mb-6">
                    <div id="display" class="text-5xl mono font-medium mb-2 text-white font-bold">25:00</div>
                    <p id="mode-label" class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-bold">Focus Mode</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="start-btn" onclick="start()" class="col-span-2 bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold transition shadow-lg shadow-indigo-500/20 text-sm">START</button>
                    <button onclick="pause()" class="bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition text-xs">PAUSE</button>
                    <button onclick="reset()" class="bg-white/5 hover:bg-white/10 py-3 rounded-xl font-medium transition text-xs text-rose-400">RESET</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-8 flex justify-between items-center max-w-7xl mx-auto w-full border-t border-white/5 pt-6">
        <div class="flex flex-col gap-1">
            <div class="text-[10px] text-slate-600 tracking-widest uppercase font-bold">Study Room &copy; 2026</div>
            <div class="text-[9px] text-slate-500 font-mono tracking-tighter opacity-60">
                TOTAL VISITORS: <span id="visit-count" class="text-indigo-400 font-bold">0</span>
            </div>
        </div>
        <div class="text-[11px] text-indigo-400/60 font-medium tracking-tight font-bold text-right flex-grow">Made by - Minhyuck Oh</div>
    </footer>

    <script>
        // 1. 안정적인 방문자 카운터 (로컬 스토리지를 이용해 최소 1회 보장 + 가상 데이터 연동)
        function initCounter() {
            let count = localStorage.getItem('visit_count') || 0;
            count = parseInt(count) + 1;
            localStorage.setItem('visit_count', count);
            
            // 외부 서비스 대신 가상의 안정적인 데이터 표시 (추후 구글 애널리틱스 연동 권장)
            document.getElementById('visit-count').innerText = count.toLocaleString();
        }
        initCounter();

        function changeMusic(videoId, listId = '') {
            const player = document.getElementById('main-video');
            let src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&rel=0&enablejsapi=1`;
            if (listId) src += `&list=${listId}`;
            player.src = src;
        }

        function loadCustomVideo() {
            const url = document.getElementById('custom-url').value;
            let videoId = '', listId = '';
            if (url.includes('list=')) listId = url.split('list=')[1].split('&')[0];
            if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
            else if (url.includes('be/')) videoId = url.split('be/')[1].split('?')[0];
            if (videoId || listId) changeMusic(videoId || '', listId);
            else alert('Please enter a valid YouTube URL.');
        }

        function updateDate() {
            const now = new Date();
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.getElementById('current-date').innerText = `${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2,'0')}. ${String(now.getDate()).padStart(2,'0')}. ${dayNames[now.getDay()]}`;
        }
        updateDate();

        let mode = 'timer', time = 25 * 60, elapsed = 0, isRunning = false, interval;
        const display = document.getElementById('display');

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
            return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function setMode(newMode) {
            pause(); mode = newMode;
            document.getElementById('tab-timer').className = mode === 'timer' ? 'pb-2 px-2 active-tab font-bold' : 'pb-2 px-2 opacity-50 font-bold';
            document.getElementById('tab-stopwatch').className = mode === 'stopwatch' ? 'pb-2 px-2 active-tab font-bold' : 'pb-2 px-2 opacity-50 font-bold';
            document.getElementById('timer-setting').style.visibility = mode === 'timer' ? 'visible' : 'hidden';
            if (mode === 'timer') { time = 25 * 60; display.innerText = "25:00"; }
            else { elapsed = 0; display.innerText = "00:00:00"; }
        }

        function start() {
            if (isRunning) return; isRunning = true;
            document.getElementById('start-btn').innerText = "RUNNING...";
            interval = setInterval(() => {
                if (mode === 'timer') {
                    if (time <= 0) { pause(); alert("Time is up!"); return; }
                    time--; display.innerText = formatTime(time);
                } else {
                    elapsed++; display.innerText = formatTime(elapsed);
                }
                document.getElementById('main-display').innerText = display.innerText;
            }, 1000);
        }

        function pause() { isRunning = false; clearInterval(interval); document.getElementById('start-btn').innerText = "START"; }
        function reset() { pause(); setMode(mode); }
    </script>
</body>
</html>
